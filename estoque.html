/* Helpers */
const pad=n=>String(n).padStart(2,"0");
const keyMes=(a,m)=>`${a}-${pad(m+1)}`;
const hjD=new Date();
const HOJE=`${hjD.getFullYear()}-${pad(hjD.getMonth()+1)}-${pad(hjD.getDate())}`;
const brl=v=>(Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const kgF=v=>(Number(v)||0).toLocaleString("pt-BR",{minimumFractionDigits:3,maximumFractionDigits:3})+" kg";
const num=v=>{const n=parseFloat(String(v||"").replace(",","."));return isNaN(n)?0:n;};
function somaExpressao(v){
  const raw=String(v??"").trim();
  if(!raw)return {ok:true,total:0,termos:[]};
  const s=raw.replace(/\s/g,"").replace(/,/g,".").replace(/−/g,"-");
  if(!/^[+-]?\d*\.?\d+(?:[+-]\d*\.?\d+)*$/.test(s))return {ok:false,total:num(raw),termos:[]};
  const termos=(s.match(/[+-]?\d*\.?\d+/g)||[]).map(Number).filter(n=>!isNaN(n));
  return {ok:true,total:termos.reduce((a,n)=>a+n,0),termos};
}
function fmtCalcValor(v,dec=3,fixo=false){
  const n=Number(v)||0;
  let s=n.toFixed(dec).replace(".",",");
  if(!fixo&&s.includes(","))s=s.replace(/0+$/," ").replace(/,\s$/," ").trim();
  return s;
}
function normalizaSomaCampo(v,dec=0){
  const r=somaExpressao(v);
  if(!r.ok)return String(v??"");
  return fmtCalcValor(r.total,dec,dec>0);
}
function normalizaKgCampo(v,tara=TARA_ACRILICO_PADRAO,descontar=true){
  const r=somaExpressao(v);
  if(!r.ok)return String(v??"");
  let total=r.total;
  if(descontar){
    const qtdTara=r.termos.filter(n=>n>tara).length;
    total=Math.max(0,total-(qtdTara*tara));
  }
  return fmtCalcValor(total,3,true);
}
const diMes=(a,m)=>new Date(a,m+1,0).getDate();
const isoDia=(a,m,d)=>`${a}-${pad(m+1)}-${pad(d)}`;
const fmtD=iso=>iso?iso.split("-").reverse().join("/"):"—";

function traduzErroFirebase(e,acao="acessar"){
  const code=e?.code||"erro-desconhecido";
  const msg=e?.message||"Sem detalhe técnico.";
  if(String(code).includes("permission-denied")){
    return {titulo:"Sem permissão no Firestore",detalhe:`O Firebase recusou ${acao}. Código: ${code}. Normalmente isso é regra do Firestore bloqueando leitura/gravação nas coleções fini_*.`};
  }
  if(String(code).includes("unavailable")||String(msg).toLowerCase().includes("network")){
    return {titulo:"Falha de conexão",detalhe:`Não consegui falar com o Firestore. Código: ${code}. Verifique internet, bloqueio do navegador ou instabilidade.`};
  }
  if(String(code).includes("failed-precondition")){
    return {titulo:"Configuração pendente no Firestore",detalhe:`O Firestore retornou ${code}. Pode haver índice/regra/configuração pendente no Firebase.`};
  }
  if(String(code).includes("invalid-argument")||String(msg).toLowerCase().includes("unsupported field value")||String(msg).toLowerCase().includes("synthetic")){
    return {titulo:"Erro interno no botão Salvar",detalhe:`O sistema tentou enviar um dado inválido para o Firestore. Corrigido nesta versão para salvar somente os dados da tela, sem enviar o evento do clique.`};
  }
  return {titulo:"Erro no Firebase",detalhe:`Código: ${code}. ${msg}`};
}

/* useFireDoc */
function useFireDoc(col,id,init){
  const [data,setData]=useState(()=>JSON.parse(JSON.stringify(init)));
  const [status,setStatus]=useState("load");
  const [dirty,setDirty]=useState(false);
  const [erro,setErro]=useState(null);
  const reload=useCallback(async()=>{setStatus("load");setErro(null);try{const s=await db.collection(col).doc(id).get();setData(s.exists?{...JSON.parse(JSON.stringify(init)),...s.data()}:JSON.parse(JSON.stringify(init)));setDirty(false);setStatus("ok");}catch(e){console.error("Firebase read error",col,id,e);setErro(traduzErroFirebase(e,"ler os dados"));setStatus("err");}},[col,id]);
  useEffect(()=>{reload();},[reload]);
  const save=async(d2)=>{
    // Quando usado direto em onClick, o React envia o evento do clique como parâmetro.
    // Se esse evento for gravado no Firestore, a gravação falha.
    // Por isso, aqui ignoramos qualquer evento de clique/formulário e salvamos o estado atual.
    const recebeuEvento=d2&&(d2.nativeEvent||d2.preventDefault||d2.target||d2.currentTarget);
    const payload=(!d2||recebeuEvento)?data:d2;
    setStatus("load");
    setErro(null);
    try{
      await db.collection(col).doc(id).set({...payload,atualizadoEm:new Date().toISOString()},{merge:true});
      if(d2&&!recebeuEvento)setData(d2);
      setDirty(false);
      setStatus("ok");
      return true;
    }catch(e){
      console.error("Firebase save error",col,id,e);
      setErro(traduzErroFirebase(e,"salvar os dados"));
      setStatus("err");
      return false;
    }
  };
  const deleteDoc=async()=>{
    setStatus("load");
    setErro(null);
    try{
      await db.collection(col).doc(id).delete();
      setData(JSON.parse(JSON.stringify(init)));
      setDirty(false);
      setStatus("ok");
      return true;
    }catch(e){
      console.error("Firebase delete error",col,id,e);
      setErro(traduzErroFirebase(e,"excluir a contagem"));
      setStatus("err");
      return false;
    }
  };
  const update=p=>{setData(d=>({...d,...(typeof p==="function"?p(d):p)}));setDirty(true);};
  const updateAndSave=async(p)=>{
    const patch=typeof p==="function"?p(data):p;
    const next={...data,...patch};
    setData(next);
    setDirty(true);
    return await save(next);
  };
  const clearLocal=(blank)=>{setData(JSON.parse(JSON.stringify(blank||init)));setDirty(false);setErro(null);setStatus("ok");};
  return{data,update,updateAndSave,status,save,reload,deleteDoc,clearLocal,dirty,erro};
}

  ).filter(f=>f.nome.trim());
  const [lista,setLista]=useState(()=>normaliza(funcs));
  const nextId=()=>{
    const nums=lista.map(f=>parseInt(String(f.id||"").replace(/\D/g,""),10)).filter(n=>!isNaN(n));
    return String(nums.length?Math.max(...nums)+1:101);

/* ══ ESCALA: Componentes ══ */
const listaFuncionarias=arr=>(arr||[]).map((f,i)=>typeof f==="string"?{id:String(101+i),nome:f,cor:CORES[i%CORES.length],jornada:"7:20h",regime:"6x1"}:{id:String(f.id||f.codigo||f.pin||String(101+i)),nome:f.nome||"",cor:f.cor||CORES[i%CORES.length],jornada:f.jornada||"7:20h",regime:f.regime||"6x1"}).filter(f=>f.nome.trim());
const corFunc=(funcs,nome)=>funcs.find(f=>f.nome===nome)?.cor||"#d8c1ca";
const horariosPadrao=especial=>especial?H_DOM_FER:H_SEMANA;
const escalaBase=(especial,funcs)=>({folga:"",slots:horariosPadrao(especial).map(h=>({hora:h,nome:""}))});
function normalizarEscalaDia(raw,especial,funcs){
  const base=escalaBase(especial,funcs);
  if(!raw)return base;
  let folga="",slots=[];
  if(Array.isArray(raw)){
    const off=raw.find(e=>e&&e.folga);
    folga=off?.nome||"";
    slots=raw.filter(e=>e&&!e.folga).map(e=>({hora:e.hora||"",nome:e.nome||""}));
  }else if(raw&&typeof raw==="object"){
    folga=raw.folga||raw.folgaNome||"";
    slots=Array.isArray(raw.slots)?raw.slots.map(s=>({hora:s.hora||"",nome:s.nome||""})):[];
  }
  slots=base.slots.map((def,i)=>({hora:slots[i]?.hora||def.hora,nome:slots[i]?.nome??def.nome}));
  return {folga,slots};
}
function conflitosEscalaDia(esc){
  const nomes=esc.slots.map(s=>s.nome).filter(Boolean);
  const avisos=[];
  if(esc.folga&&nomes.includes(esc.folga))avisos.push(`${esc.folga} está em folga e também escalada`);
  const rep=nomes.filter((n,i)=>nomes.indexOf(n)!==i);
  if(rep.length)avisos.push(`Funcionária repetida no mesmo dia: ${[...new Set(rep)].join(", ")}`);
  return avisos;
}

function EscalaSlot({slot,idx,funcs,onChange,alerta}){
  const [editH,setEditH]=useState(false);
  const [tmpH,setTmpH]=useState(slot.hora);
  useEffect(()=>setTmpH(slot.hora),[slot.hora]);
  const commit=()=>{onChange({...slot,hora:(tmpH||slot.hora).trim()});setEditH(false);};
  return(
    <div className={"ce-row slot-row"+(alerta?" alert":"")} style={{borderLeftColor:corFunc(funcs,slot.nome)}}>
      <span className="ce-tag hora">{idx+1}</span>
      {editH
        ?<input className="ce-hora-inp" value={tmpH} onChange={e=>setTmpH(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditH(false);}} autoFocus/>
        :<span className="ce-hora" onClick={()=>{setTmpH(slot.hora);setEditH(true);}} title="Clique para editar o horário">{slot.hora||"aberto"}</span>
      }
      <select className="ce-select" value={slot.nome||""} onChange={e=>onChange({...slot,nome:e.target.value})} title="Escolher funcionária do horário">
        <option value="">Escolher…</option>
        {funcs.map(f=><option key={f.nome} value={f.nome}>{f.nome}</option>)}
      </select>
      {alerta&&<span className="ce-alert" title={alerta}>⚠</span>}
    </div>
  );
}

}

  const filtro=itens.filter(n=>n.toLowerCase().includes(busca.toLowerCase()));
  const totalUn=itens.reduce((s,n)=>s+num(doc.data.itens?.[n]),0);
  const preench=itens.filter(n=>num(doc.data.itens?.[n])>0).length;
  const set=(n,v)=>doc.update(d=>({itens:{...d.itens,[n]:v}}));
  const startRename=n=>{setEditKey(n);setEditVal(n);};
  const confirmRename=()=>{if(editKey&&editVal.trim()&&editVal.trim()!==editKey)onSaveItens(itens.map(x=>x===editKey?editVal.trim().toUpperCase():x));setEditKey(null);};

/* ══ BALAS KG ══ */
function Balas({balas,onSaveBalas}){
  const [data,setData]=useState(HOJE);
  const [busca,setBusca]=useState("");
  const [showM,setShowM]=useState(false);
  const [descontarTara,setDescontarTara]=useState(true);
  const [taraAcrilico,setTaraAcrilico]=useState("0,732");
  const [editKey,setEditKey]=useState(null); // {cat, name}
  const [editVal,setEditVal]=useState("");
  const doc=useFireDoc("fini_balas_kg",data,{data,pesos:{},pacotes:{}});
  const totalKg=balas.reduce((s,c)=>s+c.itens.reduce((a,n)=>a+num(doc.data.pesos?.[n]),0),0);
  const totalPct=balas.reduce((s,c)=>s+c.itens.reduce((a,n)=>a+num(doc.data.pacotes?.[n]),0),0);
  const setKg=(n,v)=>doc.update(d=>({pesos:{...d.pesos,[n]:v}}));
  const setPct=(n,v)=>doc.update(d=>({pacotes:{...d.pacotes,[n]:v}}));
  const startRename=(cat,name)=>{setEditKey({cat,name});setEditVal(name);};
  const confirmRename=()=>{if(editKey&&editVal.trim()&&editVal.trim()!==editKey.name)onSaveBalas(balas.map(c=>c.cat===editKey.cat?{...c,itens:c.itens.map(x=>x===editKey.name?editVal.trim():x)}:c));setEditKey(null);};
  const excluirContagem=async()=>{
    const temDados=balas.some(c=>c.itens.some(n=>num(doc.data.pesos?.[n])>0||num(doc.data.pacotes?.[n])>0));
    const aviso=temDados?`Excluir a contagem de balas de ${fmtD(data)}? Os pesos e pacotes desta data serão apagados do Firebase.`:`Não há valores preenchidos na tela. Mesmo assim deseja apagar qualquer contagem de balas salva em ${fmtD(data)}?`;
    if(!confirm(aviso))return;
    await doc.deleteDoc();
  };
  const salvarELimpar=async()=>{
    const ok=await doc.save();
    if(ok){
      const pesos={},pacotes={};
      balas.forEach(c=>c.itens.forEach(n=>{pesos[n]="0";pacotes[n]="0";}));
      doc.clearLocal({data,pesos,pacotes});
    }
  };
  return <>
    <div className="htop"><div><h1>Balas a Granel (Kg)</h1><div className="hsub">Peso + pacotes · {balas.reduce((s,c)=>s+c.itens.length,0)} itens · <span style={{color:"var(--fini)"}}>duplo clique na linha para renomear</span></div></div><Status {...doc}/></div>
    <ErrBox {...doc}/>
    <div className="toolbar">
      <div className="tl">
        <div className="field"><label>Data da contagem</label><input className="inp" type="date" value={data} onChange={e=>setData(e.target.value)}/></div>
        <div className="field search"><label>Buscar bala</label><input className="inp" placeholder="parte do nome…" value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      </div>
      <div className="tl"><button className="btn ghost sm" onClick={()=>setShowM(true)}>⚙️ Gerir Catálogo</button><button className="btn ghost sm danger" onClick={excluirContagem} disabled={doc.status==="load"}>🗑️ Excluir contagem</button><button className="btn primary" onClick={salvarELimpar} disabled={!doc.dirty||doc.status==="load"}>💾 Salvar contagem</button></div>
    </div>
    <div className="totbar"><div className="tt"><span>Total em KG</span><b className="hl">{kgF(totalKg)}</b></div><div className="tt"><span>Total Pacotes</span><b>{totalPct.toLocaleString("pt-BR")}</b></div><div className="tt"><span>Tara acrílico</span><div style={{display:"flex",gap:8,alignItems:"center",marginTop:4}}><label style={{display:"flex",gap:5,alignItems:"center",fontSize:12,color:"var(--ink-soft)",fontWeight:700}}><input type="checkbox" checked={descontarTara} onChange={e=>setDescontarTara(e.target.checked)}/> descontar</label><input className="inp pinput-mini" style={{width:78}} value={taraAcrilico} onChange={e=>setTaraAcrilico(e.target.value)} title="Peso do acrílico em kg"/></div></div></div>
    <div className="ponto-help" style={{marginTop:-4}}>No campo <b>KG</b>, pode digitar soma como <b>1,450+0,098</b>. Com “descontar tara” ativo, o sistema desconta <b>0,732 kg</b> de cada pesagem maior que a tara, para registrar o peso líquido da bala.</div>
    <div className="panel">
      <div className="cat"><span>Produto</span><div style={{display:"flex",gap:18,fontSize:10,color:"var(--ink-faint)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}><span style={{width:95,textAlign:"right"}}>KG</span><span style={{width:78,textAlign:"right"}}>Pacotes</span></div></div>
      {balas.map(c=>{
        const its=c.itens.filter(n=>n.toLowerCase().includes(busca.toLowerCase()));
        if(!its.length)return null;
        const skKg=c.itens.reduce((a,n)=>a+num(doc.data.pesos?.[n]),0),skPct=c.itens.reduce((a,n)=>a+num(doc.data.pacotes?.[n]),0);
        return <React.Fragment key={c.cat}>
          <div className="cat"><span>{c.cat}</span><span className="ct">{kgF(skKg)} · {skPct} pct</span></div>
          {its.map(n=>{

            return <div className="irow" key={n} onDoubleClick={e=>{if(e.target.closest("input,select,button"))return;startRename(c.cat,n);}} title="Duplo clique na linha para renomear">
              {isEdit
                ?<input className="nm-inp" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={confirmRename} onKeyDown={e=>{e.key==="Enter"&&confirmRename();e.key==="Escape"&&setEditKey(null);}} autoFocus/>
                :<span className="nm editable" title="Duplo clique na linha para renomear">{n}</span>
              }
              <input className="inp num" style={{width:95}} type="text" inputMode="decimal" value={doc.data.pesos?.[n]??""} placeholder="0,000" onChange={e=>setKg(n,e.target.value)} onFocus={e=>{e.currentTarget.dataset.original=e.currentTarget.value;}} onBlur={e=>{if(e.currentTarget.value!==e.currentTarget.dataset.original)setKg(n,normalizaKgCampo(e.target.value,num(taraAcrilico)||TARA_ACRILICO_PADRAO,descontarTara));}} title="Pode digitar soma: 1,450+0,098. Desconta a tara do acrílico se ativo."/>
              <span className="un">kg</span>
              <input className="inp num" style={{width:78}} type="text" inputMode="decimal" value={doc.data.pacotes?.[n]??""} placeholder="0" onChange={e=>setPct(n,e.target.value)} onBlur={e=>setPct(n,normalizaSomaCampo(e.target.value,0))} title="Pode digitar soma: 1+1"/>
              <span className="un">pct</span>
            </div>;
          })}
        </React.Fragment>;
      })}
    </div>
    <div className="foot">Salvo em <b>fini_balas_kg/{data}</b>. Após salvar, a tela zera para a próxima contagem. Use “Excluir contagem” para apagar somente a contagem da data selecionada.</div>
    {showM&&<ModalBalas balas={balas} onSave={n=>{onSaveBalas(n);setShowM(false);}} onClose={()=>setShowM(false)}/>}
  </>;
}

      <div style={{marginBottom:20}}>
        <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:17,margin:"0 0 10px"}}>📦 Itens do Quiosque</div>
        <div className="panel"><table><thead><tr><th>Produto</th><th style={{width:105,textAlign:"right"}}>{fmtD(dA)}</th><th style={{width:105,textAlign:"right"}}>{fmtD(dB)}</th><th style={{width:110,textAlign:"right"}}>Diferença</th></tr></thead><tbody>{itens.filter(n=>num(res.iA[n])||num(res.iB[n])).map(n=>{const a=num(res.iA[n]),b=num(res.iB[n]),d=a-b;return <tr key={n}><td>{n}</td><td className="num">{a||"—"}</td><td className="num">{b||"—"}</td><td className={"num "+dc(d)}>{d?ds(d):"="}</td></tr>;})}
        {!itens.filter(n=>num(res.iA[n])||num(res.iB[n])).length&&<tr><td colSpan="4" style={{textAlign:"center",padding:22,color:"var(--ink-faint)"}}>Nenhum dado nas datas selecionadas.</td></tr>}</tbody></table></div>
      </div>
      <div>
        <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:17,margin:"0 0 10px"}}>🍬 Balas a Granel</div>
        <div className="panel"><table><thead><tr><th>Produto</th><th style={{width:105,textAlign:"right"}}>KG {fmtD(dA)}</th><th style={{width:105,textAlign:"right"}}>KG {fmtD(dB)}</th><th style={{width:115,textAlign:"right"}}>Δ KG</th><th style={{width:78,textAlign:"right"}}>Pct A</th><th style={{width:78,textAlign:"right"}}>Pct B</th><th style={{width:78,textAlign:"right"}}>Δ Pct</th></tr></thead><tbody>{todasBalas.filter(({nome:n})=>num(res.pA[n])||num(res.pB[n])||num(res.pkA[n])||num(res.pkB[n])).map(({cat,nome:n})=>{const kA=num(res.pA[n]),kB=num(res.pB[n]),dk=kA-kB,pA=num(res.pkA[n]),pB=num(res.pkB[n]),dp=pA-pB;return <tr key={n}><td><span style={{fontSize:10.5,color:"var(--ink-faint)",marginRight:5}}>[{cat}]</span>{n}</td><td className="num">{kA?kgF(kA):"—"}</td><td className="num">{kB?kgF(kB):"—"}</td><td className={"num "+dc(dk)}>{dkg(dk)}</td><td className="num">{pA||"—"}</td><td className="num">{pB||"—"}</td><td className={"num "+dc(dp)}>{dp?ds(dp):"="}</td></tr>;})}
        </tbody></table></div>
      </div>
    </>}
    <div className="foot">Diferença = A − B. 🟢 Positivo = consumido/vendido. 🔵 Negativo = reabastecido.</div>
  </>;
}

/* ══ DESPERDÍCIO ══ */

/* ══ CAIXA ══ */
function Caixa(){
  const [ano,setAno]=useState(hjD.getFullYear());
  const [mes,setMes]=useState(hjD.getMonth());
  const doc=useFireDoc("fini_caixa",keyMes(ano,mes),{dias:{},inicialMes:""});
  const nd=diMes(ano,mes),dias=doc.data.dias||{};
  const linhas=[];let prev=num(doc.data.inicialMes);
  for(let i=1;i<=nd;i++){const dd=pad(i),d=dias[dd]||{};const ini=d.inicial!==undefined&&d.inicial!==""?num(d.inicial):prev;const total=ini+num(d.entrada)-num(d.saida);linhas.push({dd,ini,entrada:d.entrada,saida:d.saida,obs:d.obs,forma:d.forma,total,inicialRaw:d.inicial});prev=total;}
  const set=(dd,k,v)=>doc.update(d=>({dias:{...d.dias,[dd]:{...d.dias?.[dd],[k]:v}}}));
  const tF=linhas.length?linhas[linhas.length-1].total:0,tE=linhas.reduce((s,l)=>s+num(l.entrada),0),tS=linhas.reduce((s,l)=>s+num(l.saida),0);
  return <>
    <div className="htop"><div><h1>Caixa · Troco</h1><div className="hsub">Total = inicial + entrada − saída</div></div><Status {...doc}/></div>
    <ErrBox {...doc}/>
    <div className="toolbar"><MonthNav {...{ano,mes,setAno,setMes,dirty:doc.dirty}}/><div className="tl"><div className="field"><label>Inicial do mês</label><input className="inp num" type="number" step="0.01" style={{width:115}} value={doc.data.inicialMes??""} placeholder="0,00" onChange={e=>doc.update({inicialMes:e.target.value})}/></div><button className="btn primary" onClick={()=>doc.save()} disabled={!doc.dirty||doc.status==="load"}>💾 Salvar mês</button></div></div>
    <div className="totbar"><div className="tt"><span>Entradas</span><b style={{color:"var(--green)"}}>{brl(tE)}</b></div><div className="tt"><span>Saídas</span><b style={{color:"var(--fini)"}}>{brl(tS)}</b></div><div className="tt"><span>Saldo final</span><b className="hl">{brl(tF)}</b></div></div>
    <div className="panel"><table><thead><tr><th style={{width:115}}>Data</th><th style={{width:110}}>Inicial</th><th style={{width:110}}>Entrada</th><th style={{width:110}}>Saída</th><th style={{width:140}}>Forma Pgto.</th><th>Obs</th><th style={{width:115}}>Total</th></tr></thead>
    <tbody>{linhas.map(l=>{const dt=new Date(ano,mes,Number(l.dd)),dow=dt.getDay(),isHj=`${ano}-${pad(mes+1)}-${l.dd}`===HOJE;return <tr key={l.dd} className={(isHj?"hojerow ":"")+"wd-"+["dom","seg","ter","qua","qui","sex","sab"][dow]}><td className="num">{l.dd}/{pad(mes+1)} · {WD[dow]}</td><td><input className="num" type="number" step="0.01" value={l.inicialRaw??""} placeholder={l.ini.toFixed(2)} onChange={e=>set(l.dd,"inicial",e.target.value)}/></td><td><input className="num" type="number" step="0.01" value={l.entrada??""} placeholder="0,00" onChange={e=>set(l.dd,"entrada",e.target.value)}/></td><td><input className="num" type="number" step="0.01" value={l.saida??""} placeholder="0,00" onChange={e=>set(l.dd,"saida",e.target.value)}/></td><td><select value={l.forma||""} onChange={e=>set(l.dd,"forma",e.target.value)}><option value="">—</option>{FORMAS.map(f=><option key={f}>{f}</option>)}</select></td><td><input value={l.obs??""} placeholder="—" onChange={e=>set(l.dd,"obs",e.target.value)}/></td><td className="num"><b className={l.total<0?"neg":""}>{brl(l.total)}</b></td></tr>;})}
    </tbody></table></div>
    <div className="foot">Salvo em <b>fini_caixa/{keyMes(ano,mes)}</b>. Inicial em branco = puxa total do dia anterior.</div>
  </>;
}

/* ══ CONSUMO ══ */
function Consumo({funcCon,onSaveFuncCon}){
  const [ano,setAno]=useState(hjD.getFullYear());
  const [mes,setMes]=useState(hjD.getMonth());
  const [showM,setShowM]=useState(false);
  const doc=useFireDoc("fini_consumo",keyMes(ano,mes),{entradas:[]});
  const ents=doc.data.entradas||[];
  const add=()=>doc.update(d=>({entradas:[...(d.entradas||[]),{func:funcCon[0]||"",data:HOJE,produto:"",peso:"",qtd:""}]}));
  const upd=(i,k,v)=>doc.update(d=>{const e=[...d.entradas];e[i]={...e[i],[k]:v};return{entradas:e};});
  const del=i=>doc.update(d=>({entradas:d.entradas.filter((_,j)=>j!==i)}));

    <div className="toolbar"><MonthNav {...{ano,mes,setAno,setMes,dirty:doc.dirty}}/><div className="tl"><button className="btn ghost sm" onClick={()=>setShowM(true)}>⚙️ Funcionárias</button><button className="btn ghost" onClick={add}>＋ Lançamento</button><button className="btn primary" onClick={()=>doc.save()} disabled={!doc.dirty||doc.status==="load"}>💾 Salvar mês</button></div></div>
    <div className="totbar">{pF.map(p=><div className="tt" key={p.f}><span>{p.f}</span><b>{kgF(p.peso)}</b></div>)}<div className="tt"><span>Total geral</span><b className="hl">{kgF(ents.reduce((s,e)=>s+num(e.peso),0))}</b></div></div>
    <div className="panel"><table><thead><tr><th>Funcionária</th><th>Data</th><th>Produto</th><th style={{width:110}}>Peso (kg)</th><th style={{width:80}}>Qtd</th><th style={{width:34}}></th></tr></thead>
    <tbody>{ents.map((e,i)=><tr key={i}><td><select value={e.func||""} onChange={ev=>upd(i,"func",ev.target.value)} style={{width:"100%"}}>{funcCon.map(f=><option key={f}>{f}</option>)}</select></td><td><input type="date" value={e.data||HOJE} onChange={ev=>upd(i,"data",ev.target.value)}/></td><td><input value={e.produto||""} placeholder="produto" onChange={ev=>upd(i,"produto",ev.target.value)}/></td><td><input className="num" type="number" step="0.001" value={e.peso||""} placeholder="0,000" onChange={ev=>upd(i,"peso",ev.target.value)}/></td><td><input className="num" type="number" step="1" value={e.qtd||""} placeholder="0" onChange={ev=>upd(i,"qtd",ev.target.value)}/></td><td><button className="rm" onClick={()=>del(i)}>✕</button></td></tr>)}
    {!ents.length&&<tr><td colSpan="6" style={{textAlign:"center",padding:24,color:"var(--ink-faint)"}}>Nenhum lançamento.</td></tr>}
    </tbody></table></div>
    <div className="foot">Salvo em <b>fini_consumo/{keyMes(ano,mes)}</b>.</div>
    {showM&&<ModalFuncCon funcs={funcCon} onSave={l=>{onSaveFuncCon(l);setShowM(false);}} onClose={()=>setShowM(false)}/>}
  </>;
}

/* ══ ESCALA ══ */
function gerarCels(ano,mes){const p=new Date(ano,mes,1),s=new Date(p);s.setDate(1-p.getDay());const c=[];for(let i=0;i<42;i++){const d=new Date(s);d.setDate(s.getDate()+i);c.push({date:d,dentro:d.getMonth()===mes,iso:isoDia(d.getFullYear(),d.getMonth(),d.getDate())});if(i>=34&&d.getMonth()!==mes&&d.getDay()===6)break;}return c;}

function Escala({funcEsc,onSaveFuncEsc}){
  const [ano,setAno]=useState(hjD.getFullYear());
  const [mes,setMes]=useState(hjD.getMonth());
  const [showM,setShowM]=useState(false);
  const doc=useFireDoc("fini_escala",keyMes(ano,mes),{dias:{},anotacoes:"",feriados:{}});
  const cells=useMemo(()=>gerarCels(ano,mes),[ano,mes]);
  const funcs=useMemo(()=>listaFuncionarias(funcEsc),[funcEsc]);
  const dias=doc.data.dias||{},fer=doc.data.feriados||{};
  const especial=(date,iso)=>date.getDay()===0||!!fer[iso];
  const getEscala=(dd,date,iso)=>normalizarEscalaDia(dias[dd],especial(date,iso),funcs);
  const setDia=(dd,next)=>doc.update(d=>({dias:{...d.dias,[dd]:next}}));
  const updateFolga=(dd,date,iso,nome)=>setDia(dd,{...getEscala(dd,date,iso),folga:nome});
  const updateSlot=(dd,date,iso,idx,slot)=>{const base=getEscala(dd,date,iso);const slots=[...base.slots];slots[idx]=slot;setDia(dd,{...base,slots});};
  const toggleFer=iso=>doc.update(d=>{const n={...d.feriados};if(n[iso])delete n[iso];else n[iso]=true;return{feriados:n};});

  const limparNomesTodosMeses=async()=>{
    if(!confirm("Apagar os nomes/folgas salvos dentro dos dias de TODOS os meses da escala? Os horários, feriados e anotações serão mantidos."))return;
    try{
      const snap=await db.collection("fini_escala").get();
      const batch=db.batch();
      snap.docs.forEach(docSnap=>{
        const data=docSnap.data()||{};
        const diasOrig=data.dias||{};
        const diasLimpos={};
        Object.entries(diasOrig).forEach(([dd,raw])=>{
          if(Array.isArray(raw)){
            diasLimpos[dd]={folga:"",slots:raw.filter(e=>e&&!e.folga).map(e=>({hora:e.hora||"",nome:""}))};
          }else if(raw&&typeof raw==="object"){
            diasLimpos[dd]={...raw,folga:"",folgaNome:"",slots:Array.isArray(raw.slots)?raw.slots.map(s=>({...s,nome:""})):[]};
          }else{
            diasLimpos[dd]=raw;
          }
        });
        batch.set(docSnap.ref,{dias:diasLimpos,atualizadoEm:new Date().toISOString()},{merge:true});
      });
      await batch.commit();
      await doc.reload();
      alert("Nomes apagados dos dias em todos os meses da escala. Horários e feriados foram mantidos.");
    }catch(e){
      console.error(e);
      alert("Não foi possível limpar todos os meses. Verifique a conexão e as permissões do Firebase.");
    }
  };

  const resumo=useMemo(()=>{
    const nd=diMes(ano,mes);
    return funcs.map(f=>{
      let trab=0,turnos=0,dom=0,fer_=0,folgas=0,alertas=0;
      for(let i=1;i<=nd;i++){
        const date=new Date(ano,mes,i),dd=pad(i),iso=isoDia(ano,mes,i);
        const esc=normalizarEscalaDia(dias[dd],especial(date,iso),funcs);
        const nomesTrab=esc.slots.map(s=>s.nome).filter(Boolean);
        const diaTrab=nomesTrab.includes(f.nome);
        const qtTurnos=nomesTrab.filter(n=>n===f.nome).length;
        const confl=conflitosEscalaDia(esc);
        if(diaTrab){
          trab++;
          turnos+=qtTurnos;
          if(date.getDay()===0)dom++;
          if(fer[iso])fer_++;
        }
        if(esc.folga===f.nome)folgas++;
        if(confl.some(a=>a.includes(f.nome)))alertas++;
      }
      return{nome:f.nome,cor:f.cor,trab,turnos,dom,fer:fer_,folgas,alertas};
    });
  },[ano,mes,dias,fer,funcs]);

  const totalAlertas=useMemo(()=>{
    let t=0;
    for(let i=1;i<=diMes(ano,mes);i++){
      const date=new Date(ano,mes,i),dd=pad(i),iso=isoDia(ano,mes,i);
      if(conflitosEscalaDia(normalizarEscalaDia(dias[dd],especial(date,iso),funcs)).length)t++;
    }
    return t;
  },[ano,mes,dias,fer,funcs]);

  return <>
    <div className="htop"><div><h1>Escala de Trabalho</h1><div className="hsub">Folga em primeiro lugar · horários editáveis · escolha da funcionária por horário · brancos permitidos</div></div><Status {...doc}/></div>
    <ErrBox {...doc}/>
    <div className="toolbar">
      <MonthNav {...{ano,mes,setAno,setMes,dirty:doc.dirty}}/>
      <div className="tl">
        <button className="btn ghost sm" onClick={()=>setShowM(true)}>⚙️ Funcionárias</button>
        <button className="btn ghost sm" onClick={limparNomesTodosMeses}>🧹 Limpar nomes salvos</button>
        <button className="btn ghost sm" onClick={()=>window.print()}>🖨 Imprimir</button>
        <button className="btn primary" onClick={()=>doc.save()} disabled={!doc.dirty||doc.status==="load"}>💾 Salvar mês</button>
      </div>
    </div>


    <div className="totbar">
      <div className="tt"><span>Funcionárias cadastradas</span><b>{funcs.length}</b></div>
      <div className="tt"><span>Modelo dias de semana</span><b>{H_SEMANA.join(" · ")}</b></div>
      <div className="tt"><span>Modelo dom./feriado</span><b>{H_DOM_FER.map(h=>h||"aberto").join(" · ")}</b></div>
      <div className="tt"><span>Alertas no mês</span><b className={totalAlertas?"hl":""}>{totalAlertas}</b></div>
    </div>

    <div className="egrid">
      {WD.map((w,i)=><div className={"ewd"+(i===0?" dom":i===6?" sab":"")} key={w}>{w}</div>)}
      {cells.map((c,idx)=>{
        if(!c.dentro)return <div className="ecell out" key={idx}></div>;
        const dd=pad(c.date.getDate());
        const isFer=fer[c.iso];
        const esc=getEscala(dd,c.date,c.iso);
        const avisos=conflitosEscalaDia(esc);
        const folgaAlerta=esc.folga&&esc.slots.some(s=>s.nome===esc.folga)?`${esc.folga} também está escalada em horário`:null;
        const slotAlert=(s)=>{
          if(!s.nome)return null;
          if(esc.folga&&s.nome===esc.folga)return `${s.nome} está em folga`;
          const repetida=esc.slots.filter(x=>x.nome&&x.nome===s.nome).length>1;
          return repetida?`${s.nome} aparece mais de uma vez no dia`:null;
        };
        return(
          <div className={"ecell"+(c.iso===HOJE?" today":"")+(avisos.length?" warn":"")} key={idx} title={avisos.join(" · ")}>
            <div className="dnum">
              <span>{c.date.getDate()}</span>
              <span className="ebadges">
                {avisos.length>0&&<span className="badge warn">ajustar</span>}
                <span className={"badge"+(isFer?"":" off")} onClick={()=>toggleFer(c.iso)}>{isFer?"feriado":"?"}</span>
              </span>
            </div>
            <div className="ce-rows">
              <EscalaFolgaRow nome={esc.folga} funcs={funcs} onChange={nome=>updateFolga(dd,c.date,c.iso,nome)} alerta={folgaAlerta}/>
              {esc.slots.map((s,i)=><EscalaSlot key={i} slot={s} idx={i} funcs={funcs} alerta={slotAlert(s)} onChange={slot=>updateSlot(dd,c.date,c.iso,i,slot)}/>)}
            </div>
            {especial(c.date,c.iso)&&<div className="es-mini"><b>Dom/Feriado:</b> 3 horários</div>}
          </div>
        );
      })}
    </div>

    <div style={{margin:"16px 0 14px"}}>
      <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:16,marginBottom:10,color:"var(--ink)"}}>📋 Resumo do Mês — {MESES[mes]} {ano}</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {resumo.map(r=>(
          <div key={r.nome} style={{background:"var(--card)",border:"1px solid var(--line)",borderRadius:14,padding:"14px 18px",boxShadow:"var(--shadow)",minWidth:190,flex:"1 1 190px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingBottom:10,borderBottom:"1px solid var(--line-soft)"}}>
              <span style={{width:11,height:11,borderRadius:"50%",background:r.cor,flexShrink:0,display:"inline-block"}}></span>
              <span style={{fontWeight:700,fontSize:14}}>{r.nome}</span>
              {r.alertas>0&&<span style={{marginLeft:"auto",fontSize:10,color:"#b77700"}} title="Verificar escala">⚠ {r.alertas}</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
              <div>
                <div style={{fontSize:9.5,color:"var(--ink-faint)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:3}}>Dias</div>
                <div style={{fontFamily:"'DM Mono'",fontSize:24,fontWeight:500,lineHeight:1}}>{r.trab}</div>
              </div>
              <div>
                <div style={{fontSize:9.5,color:"var(--ink-faint)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:3}}>Turnos</div>
                <div style={{fontFamily:"'DM Mono'",fontSize:24,fontWeight:500,lineHeight:1}}>{r.turnos}</div>
              </div>
              <div>
                <div style={{fontSize:9.5,color:"var(--ink-faint)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:3}}>Dom/Fer.</div>
                <div style={{fontFamily:"'DM Mono'",fontSize:24,fontWeight:500,lineHeight:1,color:(r.dom+r.fer)>0?"var(--fini)":"var(--ink-faint)"}}>{r.dom+r.fer}</div>
              </div>
              <div>

    {showM&&<ModalFuncEsc funcs={funcs} onSave={l=>{onSaveFuncEsc(l);setShowM(false);}} onClose={()=>setShowM(false)}/>}
  </>;
}


/* ══ FOLHA DE PONTO / BANCO DE HORAS ══ */
const absMin=m=>Math.abs(Math.round(m||0));
function durToMin(v){
  if(v===undefined||v===null||v==="")return 0;
  let s=String(v).trim().toLowerCase().replace("h",":").replace(",",":");
  let sign=1;if(s.startsWith("-")){sign=-1;s=s.slice(1);} 
  const p=s.split(":");
  const h=parseInt(p[0]||"0",10)||0;
  const mi=parseInt(p[1]||"0",10)||0;
  return sign*(h*60+mi);
}
function minToDur(m){
  m=Math.round(m||0);const sign=m<0?"-":"";m=Math.abs(m);
  return sign+pad(Math.floor(m/60))+":"+pad(m%60);
}
function horaToMin(v){
  if(!v)return null;
  let s=String(v).trim().toLowerCase().replace("h",":");
  if(!s)return null;
  if(!s.includes(":"))s=s+":00";
  const [h,m="0"]=s.split(":");
  const hh=parseInt(h,10),mm=parseInt(m,10);
  if(isNaN(hh)||isNaN(mm))return null;
  return hh*60+mm;
}
function diffHora(a,b){
  const ia=horaToMin(a),ib=horaToMin(b);
  if(ia===null||ib===null)return 0;
  let d=ib-ia;if(d<0)d+=1440;
  return d;
}
function normalizeTipoPonto(tipo){
  const t=String(tipo||"").trim();
  if(["Normal 7h","7h","Normal 9:40-18:00","Normal 14:00-22:20","Normal 7h20","7:20h","Trabalho","Domingo 11-17","Domingo 15-21","Domingo 6h","Domingo","Normal"].includes(t))return "";
  if(["Feriado 11-17","Feriado 15-21","Feriado 6h","Feriado"].includes(t))return "Feriado";
  if(["Folga compensatória","Folga"].includes(t))return "Folga";
  if(["Folga bonificada","Folga extra"].includes(t))return "Folga extra";
  if(["Atestado"].includes(t))return "Atestado";
  return t;
}
function jornadaMinFunc(func){return String(func?.jornada||"7:20h")==="7h"?durToMin("07:00"):durToMin("07:20");}
function jornadaStrFunc(func){return String(func?.jornada||"7:20h")==="7h"?"07:00":"07:20";}
function isFolgaTipo(tipo){return ["Folga","Folga extra"].includes(normalizeTipoPonto(tipo));}
function isFeriadoTipo(tipo){return normalizeTipoPonto(tipo)==="Feriado";}
function isAtestadoTipo(tipo){return normalizeTipoPonto(tipo)==="Atestado";}
function isDomingoData(ano,mes,dd){return new Date(ano,mes,Number(dd)).getDay()===0;}
function escalaSugeridaPonto(ano,mes,dd,func,tipo){
  const tp=normalizeTipoPonto(tipo);
  if(tp==="Folga"||tp==="Folga extra"||tp==="Atestado")return {entrada:"",saidaAlmoco:"",retornoAlmoco:"",saida:"",intervalo:"00:00",jornada:"00:00"};
  if(tp==="Feriado"||isDomingoData(ano,mes,dd))return {entrada:"11:00",saidaAlmoco:"",retornoAlmoco:"",saida:"17:00",intervalo:"00:00",jornada:"06:00"};
  const jorn=String(func?.jornada||"7:20h");
  if(jorn==="7h")return {entrada:"09:40",saidaAlmoco:"13:00",retornoAlmoco:"14:00",saida:"17:40",intervalo:"01:00",jornada:"07:00"};
  return {entrada:"09:40",saidaAlmoco:"13:00",retornoAlmoco:"14:00",saida:"18:00",intervalo:"01:00",jornada:"07:20"};
}
function horarioBasePonto(ano,mes,dd,func,tipo){
  const sug=escalaSugeridaPonto(ano,mes,dd,func,tipo);
  return {entrada:"",saidaAlmoco:"",retornoAlmoco:"",saida:"",intervalo:sug.intervalo,jornada:sug.jornada};
}
function defaultPontoRow(ano,mes,dd,func){return {tipo:"",ajuste:"",obs:"",registrosPonto:[],...horarioBasePonto(ano,mes,dd,func,"")};}
function aplicarTipoPonto(row,tipo,ano,mes,dd,func){const tp=normalizeTipoPonto(tipo);return {...row,tipo:tp,...horarioBasePonto(ano,mes,dd,func,tp)};}
function opcoesTipoPonto(){return PONTO_OCORRENCIAS;}
function rowAtivaPonto(row,ano,mes,dd){
  const tp=normalizeTipoPonto(row.tipo);
  if(tp==="Folga"||tp==="Folga extra"||tp==="Atestado"||tp==="Feriado")return true;
  return Boolean(row.entrada||row.saidaAlmoco||row.retornoAlmoco||row.saida||row.ajuste||row.obs);
}
function calcPonto(row,ano,mes,dd,func){
  const ativa=rowAtivaPonto(row,ano,mes,dd);
  const tp=normalizeTipoPonto(row.tipo);
  const ajuste=durToMin(row.ajuste);
  if(!ativa){return {ativa:false,prevista:0,trabalhada:0,intervalo:0,extra:0,devida:0,banco:0,credito:0,debito:0};}
  if(tp==="Folga"||tp==="Atestado"){
    const banco=ajuste;
    return {ativa:true,prevista:0,trabalhada:0,intervalo:0,extra:Math.max(0,banco),devida:0,banco,credito:Math.max(0,banco),debito:Math.max(0,-banco)};
  }
  if(tp==="Folga extra"){
    const banco=-(jornadaMinFunc(func))+ajuste;
    return {ativa:true,prevista:0,trabalhada:0,intervalo:0,extra:0,devida:0,banco,credito:Math.max(0,banco),debito:Math.max(0,-banco)};
  }
  const prevista=durToMin(row.jornada||escalaSugeridaPonto(ano,mes,dd,func,tp).jornada||jornadaStrFunc(func)||"07:20");
  const intervalo=(row.saidaAlmoco&&row.retornoAlmoco)?diffHora(row.saidaAlmoco,row.retornoAlmoco):durToMin(row.intervalo);
  let trabalhada=0;
  if(row.entrada&&row.saida){trabalhada=Math.max(0,diffHora(row.entrada,row.saida)-intervalo);}
  let banco=0,extra=0,devida=0;
  if(tp==="Feriado"){
    banco=(trabalhada*2)+ajuste;
    extra=Math.max(0,banco);
  }else{
    banco=(trabalhada-prevista)+ajuste;
    extra=Math.max(0,trabalhada-prevista);
    devida=Math.max(0,prevista-trabalhada);
  }
  return {ativa,prevista,trabalhada,intervalo,extra,devida,banco,credito:Math.max(0,banco),debito:Math.max(0,-banco)};
}
function corSaldo(m){return m>0?"psaldo-pos":m<0?"psaldo-neg":"psaldo-zero";}
function agoraHHMM(){const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes());}
const CAMPOS_PONTO=["entrada","saidaAlmoco","retornoAlmoco","saida"];
const ROTULOS_PONTO={entrada:"Entrada",saidaAlmoco:"Saída almoço",retornoAlmoco:"Volta almoço",saida:"Saída"};
const SENHA_ADMIN_PONTO="2231";

function FolhaPonto({funcEsc,onSaveFuncEsc}){
  const [ano,setAno]=useState(hjD.getFullYear());
  const [mes,setMes]=useState(hjD.getMonth());
  const [funcNome,setFuncNome]=useState("");
  const [showM,setShowM]=useState(false);
  const [pontoId,setPontoId]=useState("");
  const [pontoMsg,setPontoMsg]=useState("");
  const [adminPin,setAdminPin]=useState("");
  const [adminOn,setAdminOn]=useState(false);
  const doc=useFireDoc("fini_folha_ponto",keyMes(ano,mes),{funcionarias:{},anotacoes:"",status:"Aberto"});
  const escalaDoc=useFireDoc("fini_escala",keyMes(ano,mes),{dias:{},anotacoes:"",feriados:{}});
  const funcs=useMemo(()=>listaFuncionarias(funcEsc),[funcEsc]);
  const nomesDoc=Object.keys(doc.data.funcionarias||{});
  const nomes=useMemo(()=>[...new Set([...funcs.map(f=>f.nome),...nomesDoc])].filter(Boolean),[funcs,nomesDoc.join("|")]);
  useEffect(()=>{if(!funcNome&&nomes.length)setFuncNome(nomes[0]);},[nomes.join("|"),funcNome]);
  const funcAtual=funcs.find(f=>f.nome===funcNome)||{nome:funcNome,jornada:"7:20h",cor:CORES[0]};
  const dadosFunc=(doc.data.funcionarias||{})[funcNome]||{saldoInicial:"",dias:{}};
  const dias=dadosFunc.dias||{};
  const escalaMes=escalaDoc.data||{dias:{},feriados:{}};
  const diasEscala=escalaMes.dias||{};
  const ferEscala=escalaMes.feriados||{};
  const nd=diMes(ano,mes);
  const tipoAutoEscala=(dd,func=funcAtual)=>{
    const dt=new Date(ano,mes,Number(dd));
    const iso=isoDia(ano,mes,Number(dd));
    const esc=normalizarEscalaDia(diasEscala[dd],dt.getDay()===0||!!ferEscala[iso],funcs);
    return esc.folga&&esc.folga===func.nome?"Folga":"";
  };
  const temRegistroPonto=raw=>Boolean(raw.entrada||raw.saidaAlmoco||raw.retornoAlmoco||raw.saida||raw.ajuste||raw.obs||(raw.registrosPonto||[]).length);
  const devePuxarTipoEscala=raw=>!raw.tipoManual&&!raw.tipo&&!temRegistroPonto(raw);
  const getRow=dd=>{
    const raw={...(dias[dd]||{})};
    const tp=normalizeTipoPonto(raw.tipo);
    const base=defaultPontoRow(ano,mes,dd,funcAtual);
    const autoTipo=devePuxarTipoEscala(raw)?tipoAutoEscala(dd):"";
    const row={...base,...raw,tipo:tp||autoTipo};
    if(autoTipo&&!raw.tipo){row.tipoAutoEscala=true;}
    if(!raw.tipo&&!autoTipo){row.tipo="";}
    // Se era um tipo antigo salvo, normaliza para a nova lógica e mantém horários editados, se existirem.
    if(raw.tipo&&tp!==raw.tipo){row.tipo=tp;}
    return row;
  };
  const liberarAdmin=()=>{
    if(adminOn){setAdminOn(false);setAdminPin("");setPontoMsg("Edição administrativa bloqueada.");return;}
    if(String(adminPin||"").trim()===SENHA_ADMIN_PONTO){setAdminOn(true);setAdminPin("");setPontoMsg("✅ Edição administrativa liberada.");}
    else{setPontoMsg("Senha administrativa inválida.");}
  };
  const exigirAdmin=()=>{if(adminOn)return true;setPontoMsg("Digite a senha administrativa para alterar horários, limpar dia, saldo ou observações. A coluna Tipo é livre.");return false;};
  const setFuncPatch=patch=>{if(!exigirAdmin())return;doc.updateAndSave(d=>({funcionarias:{...(d.funcionarias||{}),[funcNome]:{...((d.funcionarias||{})[funcNome]||{dias:{}}),...patch,alteradoManualEm:new Date().toISOString(),alteradoManualPor:"ADMIN"}}}));};
  const setDia=(dd,k,v)=>{
    const isTipoLivre=k==="tipo";
    if(!isTipoLivre&&!exigirAdmin())return;
    doc.updateAndSave(d=>{
      const all=d.funcionarias||{};
      const fd=all[funcNome]||{saldoInicial:"",dias:{}};
      const base={...defaultPontoRow(ano,mes,dd,funcAtual),...(fd.dias?.[dd]||{})};
      let row={...base,[k]:v};
      if(isTipoLivre)row={...aplicarTipoPonto(base,v,ano,mes,dd,funcAtual),tipoManual:true,tipoAutoEscala:false};
      row={
        ...row,
        alteradoManualEm:new Date().toISOString(),
        alteradoManualPor:isTipoLivre&&!adminOn?"TIPO_LIVRE":"ADMIN"
      };
      return {funcionarias:{...all,[funcNome]:{...fd,dias:{...(fd.dias||{}),[dd]:row}}}};
    });
    if(isTipoLivre&&!adminOn)setPontoMsg("✅ Tipo do dia salvo. Horários continuam bloqueados para registro somente por ID.");
  };
  const limparDia=dd=>{if(!exigirAdmin())return;if(!confirm("Limpar os registros deste dia?"))return;doc.updateAndSave(d=>{
    const all=d.funcionarias||{};const fd=all[funcNome]||{saldoInicial:"",dias:{}};const ndias={...(fd.dias||{})};delete ndias[dd];
    return {funcionarias:{...all,[funcNome]:{...fd,dias:ndias,alteradoManualEm:new Date().toISOString(),alteradoManualPor:"ADMIN"}}};
  });};
  const resumo=useMemo(()=>{
    let trab=0,prev=0,extra=0,devida=0,cred=0,deb=0,ativos=0,feriados=0,folgas=0,folgasExtra=0,atestados=0;
    for(let i=1;i<=nd;i++){
      const dd=pad(i);
      const row=getRow(dd);
      const tp=normalizeTipoPonto(row.tipo);
      const c=calcPonto(row,ano,mes,dd,funcAtual);
      if(c.ativa)ativos++;
      if(tp==="Feriado")feriados++;
      if(tp==="Folga")folgas++;
      if(tp==="Folga extra")folgasExtra++;
      if(tp==="Atestado")atestados++;
      trab+=c.trabalhada;prev+=c.prevista;extra+=c.extra;devida+=c.devida;cred+=c.credito;deb+=c.debito;
    }
    const saldoInicial=durToMin(dadosFunc.saldoInicial);
    const saldo=saldoInicial+cred-deb;
    return {ativos,trab,prev,extra,devida,cred,deb,saldoInicial,saldo,feriados,folgas,folgasExtra,atestados};
  },[JSON.stringify(dias),dadosFunc.saldoInicial,ano,mes,nd,funcAtual.jornada,funcAtual.regime]);
  const registrarPonto=async()=>{
    const id=String(pontoId||"").trim();
    if(!id){setPontoMsg("Digite o ID da funcionária.");return;}
    const hoje=new Date();
    if(ano!==hoje.getFullYear()||mes!==hoje.getMonth()){
      setAno(hoje.getFullYear());setMes(hoje.getMonth());
      setPontoMsg("Mudei para o mês atual. Digite o ID novamente para registrar.");
      return;
    }
    const f=funcs.find(x=>String(x.id||"").trim()===id);
    if(!f){setPontoMsg("ID não encontrado. Confira em ⚙️ Funcionárias.");return;}
    const dd=pad(hoje.getDate());
    let baseDoc=doc.data;
    try{
      const snap=await db.collection("fini_folha_ponto").doc(keyMes(ano,mes)).get();
      if(snap.exists)baseDoc={...baseDoc,...snap.data()};
    }catch(e){setPontoMsg("Não consegui conferir o ponto atual no Firebase. Tente novamente.");return;}
    const all=baseDoc.funcionarias||{};
    const fd=all[f.nome]||{saldoInicial:"",dias:{}};
    const raw=fd.dias?.[dd]||{};
    const autoTipo=devePuxarTipoEscala(raw)?tipoAutoEscala(dd,f):"";
    let row={...defaultPontoRow(ano,mes,dd,f),...raw,tipo:normalizeTipoPonto(raw.tipo)||autoTipo};
    if(["Folga","Folga extra","Atestado"].includes(normalizeTipoPonto(row.tipo))){setPontoMsg(`Hoje está marcado como ${row.tipo} para ${f.nome}. Remova o tipo antes de registrar ponto.`);return;}
    const campo=CAMPOS_PONTO.find(c=>!row[c]);
    if(!campo){setPontoMsg(`${f.nome} já tem os 4 registros do dia. Use o botão limpar dia se precisar refazer.`);return;}
    const hora=agoraHHMM();
    const novoRegistro={campo,hora,registradoEm:new Date().toISOString(),id:f.id,nome:f.nome,origem:"ID_FUNCIONARIA"};
    row={...row,[campo]:hora,registrosPonto:[...(row.registrosPonto||[]),novoRegistro]};
    const novoDoc={funcionarias:{[f.nome]:{...fd,dias:{...(fd.dias||{}),[dd]:row}}},atualizadoEm:new Date().toISOString()};
    setPontoMsg("Salvando registro no Firebase...");
    try{
      await db.collection("fini_folha_ponto").doc(keyMes(ano,mes)).set(novoDoc,{merge:true});
      await doc.reload();
      setFuncNome(f.nome);
      setPontoId("");
      setPontoMsg(`✅ ${ROTULOS_PONTO[campo]} registrada e salva para ${f.nome} às ${hora}.`);
    }catch(e){
      console.error("Erro ao registrar ponto",e);
      setPontoMsg("Não foi possível salvar o registro. Confira a conexão e tente novamente.");
    }
  };
  const salvar=async()=>{const ok=await doc.save();if(ok)alert("Folha de ponto salva com sucesso.");};
  return <>
    <div className="htop"><div><h1>Folha de Ponto</h1><div className="hsub">Registro por ID · folgas puxadas automaticamente da Escala salva</div></div><Status {...doc}/></div>
    <ErrBox {...doc}/>

      <MonthNav {...{ano,mes,setAno,setMes,dirty:doc.dirty}}/>
      <div className="tl">
        <div className="field"><label>Funcionária</label><select className="inp" value={funcNome} onChange={e=>setFuncNome(e.target.value)}>{nomes.map(n=><option key={n}>{n}</option>)}</select></div>
        <div className="field"><label>ID ponto</label><input className="inp" style={{width:72}} value={funcAtual.id||""} readOnly title="Altere em ⚙️ Funcionárias"/></div>
        <div className="field"><label>Jornada padrão</label><input className="inp" style={{width:92}} value={funcAtual.jornada||"7:20h"} readOnly title="Altere em ⚙️ Funcionárias"/></div>
        <div className="field"><label>Regime</label><input className="inp" style={{width:72}} value={funcAtual.regime||"6x1"} readOnly title="Altere em ⚙️ Funcionárias"/></div>
        <button className="btn ghost sm" onClick={()=>adminOn?setShowM(true):exigirAdmin()} title="Precisa da senha administrativa">⚙️ Funcionárias</button>
        <button className="btn ghost sm" onClick={()=>window.print()}>🖨 Imprimir</button>
        <button className="btn primary" onClick={salvar} disabled={!adminOn||!doc.dirty||doc.status==="load"} title={!adminOn?"Libere a edição administrativa para salvar ajustes manuais":"Salvar mês"}>💾 Salvar mês</button>
      </div>

      <button className="btn primary" onClick={registrarPonto}>🕒 Registrar próximo ponto</button>

      <button className={"btn sm "+(adminOn?"primary":"ghost")} onClick={liberarAdmin}>{adminOn?"🔓 Admin liberado":"🔐 Liberar edição"}</button>
      <div style={{fontSize:12,color:"var(--ink-soft)",lineHeight:1.45,flex:"1 1 260px"}}>Sequência automática: <b>Entrada</b> → <b>Saída almoço</b> → <b>Volta almoço</b> → <b>Saída</b>. O horário gravado é o do computador.</div>

        const dd=pad(i),dt=new Date(ano,mes,i),row=getRow(dd),calc=calcPonto(row,ano,mes,dd,funcAtual),sug=escalaSugeridaPonto(ano,mes,dd,funcAtual,row.tipo),isDom=dt.getDay()===0,isFer=isFeriadoTipo(row.tipo),isFolga=isFolgaTipo(row.tipo),cls=(isFer?" pfer":"")+(isFolga?" pfolga":"")+(calc.banco<0?" palert":"");
        return <tr key={dd} className={cls}>
          <td className={(isDom?"pdate pdom":"pdate")}>{dd}/{pad(mes+1)}<div className="pmini">{WD[dt.getDay()]}</div></td>
          <td className="ptype"><select value={row.tipo||""} onChange={e=>setDia(dd,"tipo",e.target.value)}><option value="">Normal</option>{opcoesTipoPonto().map(t=><option key={t}>{t}</option>)}</select>{row.tipoAutoEscala&&<div className="pmini">Puxado da escala</div>}</td>
          <td><input className="pinput-mini" value={row.entrada||""} placeholder={sug.entrada||"--:--"} readOnly={!adminOn} onChange={e=>setDia(dd,"entrada",e.target.value)} title={adminOn?"Edição manual liberada":"Registro automático por ID"}/></td>
          <td><input className="pinput-mini" value={row.saidaAlmoco||""} placeholder={sug.saidaAlmoco||"--:--"} readOnly={!adminOn} onChange={e=>setDia(dd,"saidaAlmoco",e.target.value)} title={adminOn?"Edição manual liberada":"Registro automático por ID"}/></td>
          <td><input className="pinput-mini" value={row.retornoAlmoco||""} placeholder={sug.retornoAlmoco||"--:--"} readOnly={!adminOn} onChange={e=>setDia(dd,"retornoAlmoco",e.target.value)} title={adminOn?"Edição manual liberada":"Registro automático por ID"}/></td>
          <td><input className="pinput-mini" value={row.saida||""} placeholder={sug.saida||"--:--"} readOnly={!adminOn} onChange={e=>setDia(dd,"saida",e.target.value)} title={adminOn?"Edição manual liberada":"Registro automático por ID"}/></td>
          <td><input className="pinput-mini" value={row.intervalo||""} placeholder="00:00" disabled={!adminOn} onChange={e=>setDia(dd,"intervalo",e.target.value)}/></td>
          <td className="num"><b>{calc.ativa?minToDur(calc.trabalhada):"—"}</b></td>
          <td className="num psaldo-pos">{calc.extra?minToDur(calc.extra):"—"}</td>
          <td className="num psaldo-neg">{calc.devida?minToDur(calc.devida):"—"}</td>
          <td><input className="pinput-mini" value={row.ajuste||""} placeholder="00:00" disabled={!adminOn} onChange={e=>setDia(dd,"ajuste",e.target.value)} title="Ajuste manual: use 01:00 ou -01:00"/></td>
          <td className={"num "+corSaldo(calc.banco)}><b>{calc.ativa?minToDur(calc.banco):"—"}</b></td>
          <td><input className="pobs" value={row.obs||""} placeholder="observação" disabled={!adminOn} onChange={e=>setDia(dd,"obs",e.target.value)}/></td>
          <td><button className="rm" title={adminOn?"Limpar dia":"Precisa da senha administrativa"} disabled={!adminOn} onClick={()=>limparDia(dd)}>🧹</button></td>
        </tr>;
      })}</tbody></table>
    </div>
    <div className="totbar" style={{marginTop:14}}>
      <div className="tt" style={{flex:1}}><span>Anotações gerais da folha</span><textarea className="inp" style={{width:"100%",minHeight:52,resize:"vertical",marginTop:4}} value={doc.data.anotacoes||""} disabled={!adminOn} placeholder="Acordos, compensações, folgas bonificadas, justificativas…" onChange={e=>adminOn&&doc.updateAndSave({anotacoes:e.target.value})}/></div>
      <div className="tt"><span>Status</span><select className="inp" value={doc.data.status||"Aberto"} disabled={!adminOn} onChange={e=>adminOn&&doc.updateAndSave({status:e.target.value})}><option>Aberto</option><option>Conferido</option><option>Fechado</option><option>Compensado/Pago</option></select></div>
    </div>
    <div className="foot">Salvo em <b>fini_folha_ponto/{keyMes(ano,mes)}</b>. A jornada normal vem do cadastro da funcionária. Os horários de entrada, almoço, retorno e saída são gravados pelo ID da funcionária com o horário do computador. Para as funcionárias, o ponto só registra por ID com o horário do computador. A coluna Tipo fica liberada sem senha para marcar Feriado, Folga, Folga extra ou Atestado. Quando a funcionária estiver marcada como folga na aba Escala salva, a Folha de Ponto puxa Folga automaticamente e zera hora devida; horários, limpeza, saldo inicial e anotações continuam bloqueados pela senha administrativa e são salvos automaticamente no Firebase. Cadastro de funcionárias continua sendo salvo no botão do próprio cadastro.</div>
    {showM&&adminOn&&<ModalFuncEsc funcs={funcs} onSave={l=>{onSaveFuncEsc(l);setShowM(false);}} onClose={()=>setShowM(false)}/>}  
  </>;
}

/* ══ APP ══ */
const MODS=[{id:"estoque",ic:"📦",lbl:"Itens Quiosque"},{id:"balas",ic:"🍬",lbl:"Balas (Kg)"},{id:"comp",ic:"📊",lbl:"Comparativo"},{id:"desp",ic:"⚠️",lbl:"Desperdício"},{id:"caixa",ic:"💵",lbl:"Caixa / Troco"},{id:"consumo",ic:"🥤",lbl:"Consumo"},{id:"escala",ic:"📅",lbl:"Escala"},{id:"ponto",ic:"🕒",lbl:"Folha de Ponto"}];

function App(){
  const [aba,setAba]=useState("estoque");
  const cat=useFireDoc("fini_config","catalogo",{itens:D_ITENS,balas:D_BALAS});
  const func=useFireDoc("fini_config","funcionarios",{escala:D_ESC,consumo:D_CON});
  const itens=cat.data.itens||D_ITENS,balas=cat.data.balas||D_BALAS;
  const funcEsc=func.data.escala||D_ESC,funcCon=func.data.consumo||D_CON;
  const saveItens=async l=>{await cat.save({...cat.data,itens:l});};
  const saveBalas=async b=>{await cat.save({...cat.data,balas:b});};
  const saveFuncEsc=async l=>{await func.save({...func.data,escala:l});};
  const saveFuncCon=async l=>{await func.save({...func.data,consumo:l});};
  return <div className="app">
    <nav className="side">
      <div className="logo">FINI <em>Petrópolis</em></div>
      <div className="subtt">Sistema de Gestão</div>
      {MODS.map(m=><button key={m.id} className={"navb"+(aba===m.id?" on":"")} onClick={()=>setAba(m.id)}><span className="ic">{m.ic}</span>{m.lbl}</button>)}
      <div className="sp"></div>
      <div className="fb">Versão: {APP_VERSION}<br/>Firebase: ficha-tecnica-burger<br/>coleções: fini_*<br/>origem: {window.location.protocol==="file:"?"arquivo local":"site publicado"}</div>
    </nav>
    <main className="main">
      <div style={{background:"#e8fff1",border:"2px solid #3f8f5f",borderRadius:14,padding:"10px 14px",marginBottom:14,fontSize:13,fontWeight:700,color:"#135c35"}}>✅ ARQUIVO CORRETO ABERTO · V18 FOLGA DA ESCALA NA FOLHA DE PONTO · se você não vê esta faixa verde, ainda está no arquivo antigo.</div>
      {aba==="estoque"&&<Estoque itens={itens} onSaveItens={saveItens}/>}
      {aba==="balas"&&<Balas balas={balas} onSaveBalas={saveBalas}/>}
      {aba==="comp"&&<Comparativo itens={itens} balas={balas}/>}
      {aba==="desp"&&<Desperdicio/>}
      {aba==="caixa"&&<Caixa/>}
      {aba==="consumo"&&<Consumo funcCon={funcCon} onSaveFuncCon={saveFuncCon}/>}
      {aba==="escala"&&<Escala funcEsc={funcEsc} onSaveFuncEsc={saveFuncEsc}/>}
      {aba==="ponto"&&<FolhaPonto funcEsc={funcEsc} onSaveFuncEsc={saveFuncEsc}/>}
    </main>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
